                    :<div style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',fontStyle:'italic',color:'rgba(26,16,8,.4)',textAlign:'center',marginTop:'6px'}}>Aucun loup assigné</div>
                  }
                  {/* "Ajouter un loup" seulement en 1ère nuit */}
                  {isFirstNight&&(
                    <select className="nssel" style={{marginTop:'8px'}} value="" onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,'LOUP');}}>
                      <option value="">➕ Ajouter un loup...</option>
                      {players.filter(p=>p.alive&&!isWolf(p)).map(p=><option key={p.id} value={p.id}>{p.name}{p.role?` (${ROLES[p.role]?.name})`:''}</option>)}
                    </select>
                  )}
                </div>
                <div className="nsdiv"/>
                <div>
                  <div className="nslbl">🩸 Qui les loups dévorent ?</div>
                  <select className="nssel" style={{marginTop:'6px'}} value={na.wolfVictim||''} onChange={e=>setNA({wolfVictim:parseInt(e.target.value)||null})}>
                    <option value="">— Choisir une victime —</option>
                    {players.filter(p=>p.alive&&!isWolf(p)).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                  {na.wolfVictim&&<div className="nscfm r">🩸 {players.find(p=>p.id===na.wolfVictim)?.name}</div>}
                </div>
              </div>
            )}

            {/* CUPIDON */}
            {role==='CUPIDON'&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'8px'}}>
                <div className="nslbl">Qui est Cupidon ?</div>
                <select className="nssel" value={players.find(p=>p.role==='CUPIDON')?.id||''} onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,'CUPIDON');}}>
                  <option value="">— Sélectionner —</option>
                  {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='CUPIDON'?` (${ROLES[p.role]?.name||p.role})`:''}</option>)}
                </select>
                {players.find(p=>p.role==='CUPIDON')&&<div className="nscfm g">✓ {players.find(p=>p.role==='CUPIDON').name}</div>}
                <div className="nsdiv"/>
                <div className="nslbl">Désigne les 2 amoureux</div>
                {[0,1].map(i=>{
                  const lovers=players.filter(p=>p.lover),lover=lovers[i];
                  return(
                    <select key={i} className="nssel" value={lover?.id||''} onChange={e=>{
                      const newId=parseInt(e.target.value),other=lovers[i===0?1:0];
                      setPlayers(prev=>prev.map(p=>{
                        if(p.id===newId) return{...p,lover:true,loverId:other?.id||null};
                        if(lover&&p.id===lover.id) return{...p,lover:false,loverId:null};
                        if(other&&p.id===other.id) return{...p,loverId:newId};
                        return p;
                      }));
                    }}>
                      <option value="">— Amoureux {i+1} —</option>
                      {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                    </select>
                  );
                })}
                {players.filter(p=>p.lover).length===2&&<div className="nscfm a">💘 {players.filter(p=>p.lover).map(p=>p.name).join(' & ')}</div>}
              </div>
            )}

            {/* SORCIÈRE */}
            {role==='SORCIERE'&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'10px'}}>
                {isFirstNight&&<>
                  <div className="nslbl">Qui est la Sorcière ?</div>
                  <select className="nssel" value={players.find(p=>p.role==='SORCIERE')?.id||''} onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,'SORCIERE');}}>
                    <option value="">— Sélectionner —</option>
                    {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='SORCIERE'?` (${ROLES[p.role]?.name})`:''}</option>)}
                  </select>
                  {players.find(p=>p.role==='SORCIERE')&&<div className="nscfm g">✓ {players.find(p=>p.role==='SORCIERE').name}</div>}
                  <div className="nsdiv"/>
                </>}
                {!isFirstNight&&players.find(p=>p.role==='SORCIERE')&&<div className="nscfm g" style={{marginBottom:'4px'}}>🧪 {players.find(p=>p.role==='SORCIERE').name}</div>}
                <div className="vtbox">
                  <div className="vtlbl">Victime des loups cette nuit</div>
                  <div className="vtnm">{na.wolfVictim?players.find(p=>p.id===na.wolfVictim)?.name:<span style={{opacity:.38,fontFamily:"'IM Fell English',serif",fontStyle:'italic',fontSize:'14px'}}>Aucune victime</span>}</div>
                </div>
                {(()=>{
                  const sorc=players.find(p=>p.role==='SORCIERE');
                  const alreadyUsed=sorc?.potionLifeUsed;
                  if(alreadyUsed) return <div style={{padding:'8px 12px',borderRadius:'3px',background:'rgba(26,16,8,.08)',border:'1px dashed rgba(26,16,8,.2)',textAlign:'center',fontFamily:"'Cinzel',serif",fontSize:'10px',color:'rgba(26,16,8,.38)',letterSpacing:'.08em'}}>🧪 Potion de vie — déjà utilisée</div>;
                  if(!na.wolfVictim) return null;
                  return <button className={`ptog ${na.potionLifeUsed?'on':'off'}`} onClick={()=>setNA({potionLifeUsed:!na.potionLifeUsed})}>{na.potionLifeUsed?'🧪 Potion de vie utilisée — joueur sauvé':'Utiliser la potion de vie'}</button>;
                })()}
                <div>
                  <div className="nslbl">☠️ Potion de mort</div>
                  {(()=>{
                    const sorc=players.find(p=>p.role==='SORCIERE');
                    if(sorc?.potionDeathUsed) return <div style={{padding:'8px 12px',borderRadius:'3px',background:'rgba(26,16,8,.08)',border:'1px dashed rgba(26,16,8,.2)',textAlign:'center',fontFamily:"'Cinzel',serif",fontSize:'10px',color:'rgba(26,16,8,.38)',letterSpacing:'.08em',marginTop:'6px'}}>☠️ Potion de mort — déjà utilisée</div>;
                    return <>
                      <select className="nssel" style={{marginTop:'6px'}} value={na.potionDeathTarget||''} onChange={e=>setNA({potionDeathTarget:parseInt(e.target.value)||null})}>
                        <option value="">— Ne pas utiliser —</option>
                        {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                      </select>
                      {na.potionDeathTarget&&<div className="nscfm r">☠️ {players.find(p=>p.id===na.potionDeathTarget)?.name}</div>}
                    </>;
                  })()}
                </div>
              </div>
            )}

            {/* SALVATEUR */}
            {role==='SALVATORE'&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'8px'}}>
                {isFirstNight&&<>
                  <div className="nslbl">Qui est le Salvateur ?</div>
                  <select className="nssel" value={players.find(p=>p.role==='SALVATORE')?.id||''} onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,'SALVATORE');}}>
                    <option value="">— Sélectionner —</option>
                    {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='SALVATORE'?` (${ROLES[p.role]?.name})`:''}</option>)}
                  </select>
                  {players.find(p=>p.role==='SALVATORE')&&<div className="nscfm g">✓ {players.find(p=>p.role==='SALVATORE').name}</div>}
                  <div className="nsdiv"/>
                </>}
                {!isFirstNight&&players.find(p=>p.role==='SALVATORE')&&<div className="nscfm g" style={{marginBottom:'4px'}}>🛡️ {players.find(p=>p.role==='SALVATORE').name}</div>}
                <div className="nslbl">Qui protège-t-il cette nuit ?</div>
                <select className="nssel" value={na.salvateurTarget||''} onChange={e=>setNA({salvateurTarget:parseInt(e.target.value)||null})}>
                  <option value="">— Choisir un joueur —</option>
                  {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
                {na.salvateurTarget&&<div className="nscfm g">🛡️ {players.find(p=>p.id===na.salvateurTarget)?.name}</div>}
              </div>
            )}

            {/* CORBEAU */}
            {role==='CORBEAU'&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'8px'}}>
                {isFirstNight&&<>
                  <div className="nslbl">Qui est le Corbeau ?</div>
                  <select className="nssel" value={players.find(p=>p.role==='CORBEAU')?.id||''} onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,'CORBEAU');}}>
                    <option value="">— Sélectionner —</option>
                    {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='CORBEAU'?` (${ROLES[p.role]?.name})`:''}</option>)}
                  </select>
                  {players.find(p=>p.role==='CORBEAU')&&<div className="nscfm g">✓ {players.find(p=>p.role==='CORBEAU').name}</div>}
                  <div className="nsdiv"/>
                </>}
                {!isFirstNight&&players.find(p=>p.role==='CORBEAU')&&<div className="nscfm g" style={{marginBottom:'4px'}}>🦅 {players.find(p=>p.role==='CORBEAU').name}</div>}
                <div className="nslbl">Curseur +2 votes sur qui ?</div>
                <select className="nssel" value={na.corbeauTarget||''} onChange={e=>setNA({corbeauTarget:parseInt(e.target.value)||null})}>
                  <option value="">— Choisir un joueur —</option>
                  {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
                {na.corbeauTarget&&<div className="nscfm a">🦅 {players.find(p=>p.id===na.corbeauTarget)?.name} +2 votes</div>}
              </div>
            )}

            {/* VOYANTE */}
            {role==='VOYANTE'&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'8px'}}>
                {isFirstNight&&<>
                  <div className="nslbl">Qui est la Voyante ?</div>
                  <select className="nssel" value={players.find(p=>p.role==='VOYANTE')?.id||''} onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,'VOYANTE');}}>
                    <option value="">— Sélectionner —</option>
                    {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='VOYANTE'?` (${ROLES[p.role]?.name})`:''}</option>)}
                  </select>
                  {players.find(p=>p.role==='VOYANTE')&&<div className="nscfm g">✓ {players.find(p=>p.role==='VOYANTE').name}</div>}
                  <div className="nsdiv"/>
                </>}
                {!isFirstNight&&players.find(p=>p.role==='VOYANTE')&&<div className="nscfm g" style={{marginBottom:'4px'}}>🔮 {players.find(p=>p.role==='VOYANTE').name}</div>}
                <div className="nslbl">Qui espionne-t-elle ?</div>
                <select className="nssel" value={na.voyanteTarget||''} onChange={e=>setNA({voyanteTarget:parseInt(e.target.value)||null})}>
                  <option value="">— Choisir un joueur —</option>
                  {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
                {na.voyanteTarget&&(()=>{
                  const t=players.find(p=>p.id===na.voyanteTarget),wolf=t&&isWolf(t);
                  return(
                    <div style={{borderRadius:'4px',padding:'10px',textAlign:'center',background:wolf?'rgba(139,26,26,.12)':'rgba(45,90,61,.1)',border:`1px solid ${wolf?'rgba(139,26,26,.32)':'rgba(45,90,61,.28)'}`}}>
                      <div style={{fontFamily:"'IM Fell English',serif",fontSize:'10px',fontStyle:'italic',color:'rgba(26,16,8,.38)',marginBottom:'4px'}}>visible meneur uniquement</div>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:'14px',color:wolf?'var(--blood)':'var(--green)',fontWeight:'700'}}>{ROLES[t?.role]?.emoji} {ROLES[t?.role]?.name} — {wolf?'🐺 LOUP':'✅ VILLAGE'}</div>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* TROIS FRÈRES */}
            {role==='TROIS_FRERES'&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'6px'}}>
                <div className="nslbl">Qui sont les 3 frères ?</div>
                {[0,1,2].map(i=>{
                  const freres=players.filter(p=>p.role==='TROIS_FRERES');
                  const f=freres[i];
                  return(
                    <select key={i} className="nssel" value={f?.id||''}
                      onChange={e=>{
                        const newId=parseInt(e.target.value); if(!newId) return;
                        const oldF=freres[i];
                        setPlayers(prev=>prev.map(p=>{
                          if(p.id===newId) return {...p,role:'TROIS_FRERES',team:'village'};
                          if(oldF&&p.id===oldF.id) return {...p,role:null,team:null};
                          return p;
                        }));
                      }}>
                      <option value="">— Frère {i+1} —</option>
                      {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='TROIS_FRERES'?` (${ROLES[p.role]?.name})`:''}</option>)}
                    </select>
                  );
                })}
                {players.filter(p=>p.role==='TROIS_FRERES').length===3&&<div className="nscfm g">✓ {players.filter(p=>p.role==='TROIS_FRERES').map(p=>p.name).join(', ')}</div>}
              </div>
            )}

            {/* DEUX SŒURS */}
            {role==='DEUX_SOEURS'&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'6px'}}>
                <div className="nslbl">Qui sont les 2 sœurs ?</div>
                {[0,1].map(i=>{
                  const soeurs=players.filter(p=>p.role==='DEUX_SOEURS');
                  const s=soeurs[i];
                  return(
                    <select key={i} className="nssel" value={s?.id||''}
                      onChange={e=>{
                        const newId=parseInt(e.target.value); if(!newId) return;
                        const oldS=soeurs[i];
                        setPlayers(prev=>prev.map(p=>{
                          if(p.id===newId) return {...p,role:'DEUX_SOEURS',team:'village'};
                          if(oldS&&p.id===oldS.id) return {...p,role:null,team:null}; // retirer l'ancienne
                          return p;
                        }));
                      }}>
                      <option value="">— Sœur {i+1} —</option>
                      {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='DEUX_SOEURS'?` (${ROLES[p.role]?.name})`:''}</option>)}
                    </select>
                  );
                })}
                {players.filter(p=>p.role==='DEUX_SOEURS').length===2&&<div className="nscfm g">✓ {players.filter(p=>p.role==='DEUX_SOEURS').map(p=>p.name).join(' & ')}</div>}
              </div>
            )}

            {/* JOUEUR DE FLÛTE : assigner + enchanter 2 NOUVEAUX joueurs cette nuit */}
            {role==='JOUEUR_FLUTE'&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'8px'}}>
                {isFirstNight&&<>
                  <div className="nslbl">Qui joue ce rôle ?</div>
                  <select className="nssel" value={cur.length>0?cur[0].id:''} onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,'JOUEUR_FLUTE');}}>
                    <option value="">— Sélectionner —</option>
                    {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='JOUEUR_FLUTE'?` (${ROLES[p.role]?.name})`:''}</option>)}
                  </select>
                  {cur.length>0&&<div className="nscfm g">✓ {cur[0].name}</div>}
                  <div className="nsdiv"/>
                </>}
                {!isFirstNight&&cur.length>0&&<div className="nscfm g" style={{marginBottom:'4px'}}>🎵 {cur[0].name}</div>}

                {/* Déjà enchantés (nuits précédentes) */}
                {players.filter(p=>p.enchanted&&p.alive).length>0&&(
                  <div style={{background:'rgba(74,32,96,.1)',border:'1px solid rgba(74,32,96,.25)',borderRadius:'4px',padding:'8px 10px'}}>
                    <div className="nslbl" style={{marginBottom:'4px',color:'var(--purple)'}}>🎵 Déjà enchantés</div>
                    <div style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',color:'rgba(26,16,8,.6)'}}>
                      {players.filter(p=>p.enchanted&&p.alive).map(p=>p.name).join(', ')}
                    </div>
                  </div>
                )}

                <div className="nslbl">2 nouveaux joueurs à enchanter cette nuit</div>
                {[0,1].map(i=>(
                  <select key={i} className="nssel"
                    value={na.newEnchanted[i]||''}
                    onChange={e=>{
                      const newId=parseInt(e.target.value)||null;
                      setNA({newEnchanted:na.newEnchanted.map((v,j)=>j===i?newId:v)});
                    }}>
                    <option value="">— Nouveau joueur {i+1} —</option>
                    {players.filter(p=>p.alive&&!p.enchanted).map(p=>(
                      <option key={p.id} value={p.id}>{p.name}{p.role?` (${ROLES[p.role]?.name})`:''}</option>
                    ))}
                  </select>
                ))}
                {na.newEnchanted.filter(Boolean).length>0&&(
                  <div className="nscfm a">🎵 {na.newEnchanted.filter(Boolean).map(id=>players.find(p=>p.id===id)?.name).filter(Boolean).join(' & ')} seront enchantés</div>
                )}

                {/* Vérif victoire : tous enchantés ? */}
                {(()=>{
                  const aliveCount=players.filter(p=>p.alive).length;
                  const enchantedCount=players.filter(p=>p.enchanted&&p.alive).length + na.newEnchanted.filter(id=>id&&players.find(p=>p.id===id)?.alive&&!players.find(p=>p.id===id)?.enchanted).length;
                  if(aliveCount>0&&enchantedCount>=aliveCount) return(
                    <div style={{background:'rgba(74,32,96,.2)',border:'2px solid var(--purple)',borderRadius:'4px',padding:'10px',textAlign:'center',fontFamily:"'Cinzel Decorative',serif",fontSize:'13px',color:'var(--purple)'}}>
                      🎵 TOUS ENCHANTÉS — VICTOIRE DU JOUEUR DE FLÛTE !
                    </div>
                  );
                  return null;
                })()}
              </div>
            )}

            {/* LOVER info */}
            {role==='LOVER'&&getAssigned(role).length>0&&(
              <div className="nstags">{getAssigned(role).map(p=><span key={p.id} className="nstag pk">{p.name}</span>)}</div>
            )}

            {/* CHARMED : afficher tous les enchantés (permanents + nouveaux cette nuit) */}
            {role==='CHARMED'&&(()=>{
              const permanent=players.filter(p=>p.enchanted&&p.alive);
              const newOnes=(na.newEnchanted||[]).filter(id=>id&&players.find(p=>p.id===id)?.alive&&!players.find(p=>p.id===id)?.enchanted).map(id=>players.find(p=>p.id===id));
              const allCharmed=[...permanent,...newOnes];
              if(allCharmed.length===0) return <div style={{fontFamily:"'IM Fell English',serif",fontSize:'13px',fontStyle:'italic',color:'rgba(26,16,8,.4)',textAlign:'center'}}>Aucun joueur charmé pour l'instant</div>;
              return(
                <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'8px'}}>
                  <div className="nstags">
                    {permanent.map(p=><span key={p.id} className="nstag pk">🎵 {p.name}</span>)}
                    {newOnes.map(p=><span key={p.id} style={{padding:'4px 10px',borderRadius:'20px',fontFamily:"'IM Fell English',serif",fontSize:'12px',border:'1px solid var(--purple)',background:'rgba(74,32,96,.15)',color:'var(--purple)'}}>✨ {p.name} <span style={{fontSize:'10px',opacity:.7}}>(cette nuit)</span></span>)}
                  </div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:'10px',letterSpacing:'.1em',color:'rgba(26,16,8,.45)',textAlign:'center'}}>
                    {allCharmed.length} joueur{allCharmed.length>1?'s':''} charmé{allCharmed.length>1?'s':''} au total
                  </div>
                </div>
              );
            })()}
          </div>
        )}
      </div>

      <div className="nsnav">
        <button className="nsbtn pv" disabled={idx===0} onClick={()=>setIdx(i=>i-1)}>← Préc.</button>
        {!isRecap?<button className="nsbtn nx" onClick={()=>setIdx(i=>i+1)}>Suivant →</button>:<button className="nsbtn fn" onClick={onFinish}>✓ Appliquer & Terminer</button>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
