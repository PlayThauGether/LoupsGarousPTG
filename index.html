<!DOCTYPE html>
<html lang="fr">
<head>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon-180.png">

<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">

<!-- Splash screens iOS (optionnel - améliore le démarrage) -->
<meta name="apple-touch-fullscreen" content="yes">

<!-- Android / Chrome -->
<meta name="mobile-web-app-capable" content="yes">

<!-- Général -->
<meta name="description" content="Aide narration meneur de jeu Loups-Garous by Play Thau'Gether">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1008;--parchment:#f5e6c8;--parchment-dark:#e8d4a8;--parchment-mid:#ede0c0;--blood:#8b1a1a;--gold:#c9a84c;--gold-bright:#e8c66a;--green:#2d5a3d;--purple:#4a2060;--amber:#7a4a00;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0a06;color:var(--ink);font-family:'IM Fell English',serif;min-height:100vh;overflow-x:hidden;}
/* Safe area pour iPhone (encoche / Dynamic Island / barre home) */
.gs{padding-top:max(10px, env(safe-area-inset-top)) !important;padding-bottom:max(10px, env(safe-area-inset-bottom)) !important;padding-left:max(12px, env(safe-area-inset-left)) !important;padding-right:max(12px, env(safe-area-inset-right)) !important;}
.cs{padding-top:max(0px, env(safe-area-inset-top));}
.rs{padding-top:max(0px, env(safe-area-inset-top));}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(139,26,26,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 90%,rgba(201,168,76,.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;}

/* HEADER */
.ph{text-align:center;padding:16px 16px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.ph .logo-slot{display:flex;align-items:center;justify-content:center;}
.ph .logo-slot img{width:clamp(280px,55vw,560px);height:auto;object-fit:contain;display:block;}
.ph p{font-family:'Cinzel',serif;color:rgba(245,230,200,.55);font-size:11px;letter-spacing:.3em;text-transform:uppercase;}
.orn{display:flex;align-items:center;gap:12px;color:var(--gold);font-size:16px;margin:12px auto;opacity:.45;max-width:400px;}
.orn::before,.orn::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);}

/* PARCHEMIN */
.parch{background:linear-gradient(145deg,var(--parchment) 0%,var(--parchment-mid) 50%,var(--parchment-dark) 100%);border-radius:4px;padding:20px;position:relative;box-shadow:0 4px 24px rgba(0,0,0,.6),inset 0 0 40px rgba(139,26,26,.04);border:1px solid rgba(201,168,76,.32);}
.parch::before{content:'';position:absolute;inset:4px;border:1px solid rgba(139,100,30,.16);border-radius:2px;pointer-events:none;}
.stitle{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--blood);margin-bottom:14px;}

/* BOUTONS */
.btn-p{width:100%;padding:14px 24px;background:linear-gradient(135deg,var(--blood) 0%,#6b1111 100%);color:var(--parchment);border:none;border-radius:3px;font-family:'Cinzel Decorative',serif;font-size:14px;letter-spacing:.08em;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(139,26,26,.4);position:relative;overflow:hidden;}
.btn-p::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 50%);}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(139,26,26,.6);}
.btn-p:disabled{opacity:.32;cursor:not-allowed;transform:none;}
.btn-g{background:transparent;border:1px solid rgba(245,230,200,.15);color:rgba(245,230,200,.48);border-radius:3px;padding:10px 16px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;cursor:pointer;transition:all .2s;}
.btn-g:hover{border-color:rgba(245,230,200,.32);color:rgba(245,230,200,.78);}

/* ÉCRAN 1 — COUNT */
.cs{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 40px;}
.cs-card{width:100%;max-width:380px;margin-top:16px;}
.cn{text-align:center;padding:32px 20px 28px;}
.cn-num{font-family:'Cinzel Decorative',serif;font-size:96px;line-height:1;color:var(--gold-bright);text-shadow:0 0 40px rgba(201,168,76,.4);}
.cn-unit{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:rgba(245,230,200,.28);margin-top:4px;}
.slider-wrap{padding:0 8px;margin-bottom:24px;}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:rgba(201,168,76,.18);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold-bright);cursor:pointer;box-shadow:0 0 12px rgba(201,168,76,.5);border:2px solid rgba(201,168,76,.8);}
.slider-lbl{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;color:rgba(245,230,200,.28);margin-top:6px;}

/* ÉCRAN 2 — ROLES */
.rs{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 40px;}
.rs-card{width:100%;max-width:680px;margin-top:8px;}
@media(max-width:560px){.rs-2col{grid-template-columns:1fr !important}}
.rc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.rc-count{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.15em;}
.rc-count.ok{color:var(--green)}.rc-count.warn{color:var(--blood);}
.team-blk{margin-bottom:18px;}
.team-hdr{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid rgba(139,100,30,.18);margin-bottom:8px;}
.team-hdr.loups{color:var(--blood)}.team-hdr.village{color:var(--green)}.team-hdr.variable{color:var(--amber)}.team-hdr.solo{color:var(--purple);}
.roles-flex{display:flex;flex-wrap:wrap;gap:6px;}
.rchip{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:3px;border:1px solid rgba(26,16,8,.14);background:rgba(26,16,8,.05);font-family:'IM Fell English',serif;font-size:12px;color:var(--ink);cursor:pointer;transition:all .15s;user-select:none;}
.rchip:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.14);}
.rchip.on-loups{background:rgba(139,26,26,.14);border-color:var(--blood);color:var(--blood);}
.rchip.on-village{background:rgba(45,90,61,.14);border-color:var(--green);color:var(--green);}
.rchip.on-solo{background:rgba(74,32,96,.14);border-color:var(--purple);color:var(--purple);}
.rchip.on-variable{background:rgba(122,74,0,.14);border-color:var(--amber);color:var(--amber);}
.rchip-cnt{background:var(--blood);color:#fff;font-size:9px;font-family:'Cinzel',serif;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
.rdesc{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:linear-gradient(145deg,var(--parchment),var(--parchment-dark));border-radius:6px;padding:12px 16px;max-width:300px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.6);border:1px solid rgba(201,168,76,.28);z-index:200;animation:fup .2s ease;font-family:'IM Fell English',serif;font-size:13px;font-style:italic;color:rgba(26,16,8,.72);line-height:1.5;}
.rdesc strong{font-style:normal;font-family:'Cinzel',serif;font-size:12px;display:block;margin-bottom:4px;color:var(--ink);}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ptg{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:rgba(245,230,200,.15);margin-top:20px;text-transform:uppercase;text-align:center;}

/* ÉCRAN 3 — JEU */
.gs{min-height:100vh;display:flex;flex-direction:column;padding:10px 12px;gap:10px;}
/* Panneau récap desktop */

/* Tablette : layout optimisé */
@media(max-width:700px){
  .gs{padding:8px;}
}
@media(min-width:600px){
  .nscard{max-width:480px;}
  .nssel{font-size:16px;padding:10px 14px;}
  .nsbtn{padding:16px;font-size:13px;}
}
.g-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.g-title{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:clamp(13px,3vw,18px);text-shadow:0 0 16px rgba(201,168,76,.4);}
.stats-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sp{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-family:'Cinzel',serif;font-size:11px;font-weight:700;}
.sp.w{background:rgba(139,26,26,.28);color:#ff8888;border:1px solid rgba(139,26,26,.48);}
.sp.v{background:rgba(45,90,61,.28);color:#7de09a;border:1px solid rgba(45,90,61,.48);}
.bp{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-family:'Cinzel',serif;font-size:10px;}
.bp.growl{background:rgba(139,26,26,.22);border:1px solid rgba(139,26,26,.4);color:#ff9999;animation:bpls 1.5s ease-in-out infinite;}
.bp.calm{background:rgba(45,90,61,.12);border:1px solid rgba(45,90,61,.28);color:#88cc99;}
@keyframes bpls{0%,100%{box-shadow:0 0 0 0 rgba(139,26,26,.3)}50%{box-shadow:0 0 0 5px rgba(139,26,26,0)}}
.hbtns{display:flex;gap:6px;}
.ibtn{width:34px;height:34px;border-radius:50%;background:rgba(245,230,200,.07);border:1px solid rgba(245,230,200,.13);color:rgba(245,230,200,.58);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ibtn:hover{background:rgba(245,230,200,.16);color:var(--parchment);}
.board{flex:1;display:flex;align-items:center;justify-content:center;min-height:260px;}
.csvg{width:100%;max-width:min(88vw,66vh);height:auto;}
.pnode{cursor:pointer;}
.nbar{background:rgba(13,10,6,.9);border:1px solid rgba(201,168,76,.16);border-radius:4px;padding:7px 12px;overflow-x:auto;display:flex;gap:6px;align-items:center;scrollbar-width:none;}
.nbar::-webkit-scrollbar{display:none;}
.nbar-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.25em;color:var(--gold);white-space:nowrap;flex-shrink:0;text-transform:uppercase;}
.nchip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:3px;background:rgba(245,230,200,.04);border:1px solid rgba(245,230,200,.07);white-space:nowrap;flex-shrink:0;}
.nchip span:first-child{font-size:13px;}
.nchip span:last-child{font-family:'IM Fell English',serif;font-size:11px;color:rgba(245,230,200,.62);}

/* MODALE JOUEUR */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:16px;}
.pmod{background:linear-gradient(160deg,var(--parchment) 0%,var(--parchment-dark) 100%);border-radius:8px 8px 4px 4px;padding:20px;width:100%;max-width:420px;box-shadow:0 -8px 40px rgba(0,0,0,.6);border-top:3px solid var(--gold);animation:su .22s ease;}
@keyframes su{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mod-name{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.mod-rl{display:flex;align-items:center;gap:8px;font-family:'IM Fell English',serif;font-size:15px;color:rgba(26,16,8,.62);margin-bottom:12px;}
.mod-desc{font-family:'IM Fell English',serif;font-size:12px;font-style:italic;color:rgba(26,16,8,.48);line-height:1.45;margin-bottom:12px;}
.mod-rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:4px;max-height:148px;overflow-y:auto;margin-bottom:12px;}
.ropt{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border-radius:3px;border:1px solid rgba(26,16,8,.13);background:rgba(26,16,8,.04);cursor:pointer;transition:all .1s;font-family:'IM Fell English',serif;font-size:10px;color:var(--ink);text-align:center;}
.ropt:hover{background:rgba(26,16,8,.1);}
.ropt .re{font-size:18px;}
.ropt.sl{background:rgba(139,26,26,.13);border-color:var(--blood);color:var(--blood);}
.ropt.sv{background:rgba(45,90,61,.13);border-color:var(--green);color:var(--green);}
.ropt.ss{background:rgba(74,32,96,.13);border-color:var(--purple);color:var(--purple);}
.ropt.sa{background:rgba(122,74,0,.13);border-color:var(--amber);color:var(--amber);}
.mod-btns{display:flex;flex-direction:column;gap:8px;}
.mb{padding:10px;border-radius:3px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;border:1px solid;}
.mb.kill{background:rgba(139,26,26,.09);border-color:var(--blood);color:var(--blood);}
.mb.rev{background:rgba(45,90,61,.09);border-color:var(--green);color:var(--green);}
.mb.cls{background:rgba(26,16,8,.04);border-color:rgba(26,16,8,.16);color:rgba(26,16,8,.42);}

/* SLIDESHOW NUIT */
.nsw{position:fixed;inset:0;background:#0d0a06;z-index:200;display:flex;flex-direction:column;}
.nsprog{height:2px;background:rgba(201,168,76,.1);flex-shrink:0;}
.nspf{height:100%;background:var(--gold);transition:width .3s ease;}
.nshdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid rgba(201,168,76,.1);flex-shrink:0;}
.nscnt{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:rgba(201,168,76,.38);}
.nstit{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,168,76,.62);}
.nscls{background:none;border:none;color:rgba(245,230,200,.28);font-size:20px;cursor:pointer;transition:color .2s;}
.nscls:hover{color:rgba(245,230,200,.78);}
.nsbody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;overflow-y:auto;}
.nscard{width:100%;max-width:380px;background:linear-gradient(160deg,var(--parchment) 0%,var(--parchment-dark) 100%);border-radius:6px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,.8);position:relative;overflow:hidden;}
.nscard::before{content:'';position:absolute;inset:4px;border:1px solid rgba(139,100,30,.16);border-radius:3px;pointer-events:none;}
.nscard.tl{border-top:4px solid var(--blood);}
.nscard.tv{border-top:4px solid var(--green);}
.nscard.ts{border-top:4px solid var(--purple);}
.nscard.ta{border-top:4px solid var(--amber);}
.nscard.tr{border-top:4px solid var(--gold);}
.nse{font-size:64px;line-height:1;filter:drop-shadow(0 3px 10px rgba(0,0,0,.28));}
.nsn{font-family:'Cinzel',serif;font-size:clamp(16px,4vw,22px);font-weight:700;color:var(--ink);text-align:center;line-height:1.2;}
.nsnote{font-family:'IM Fell English',serif;font-size:13px;font-style:italic;color:rgba(26,16,8,.55);text-align:center;line-height:1.5;max-width:280px;}
.nsdiv{width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(139,100,30,.22),transparent);}
.nslbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(26,16,8,.36);text-align:center;width:100%;}
.nssel{width:100%;background:rgba(26,16,8,.05);border:1px solid rgba(139,100,30,.26);border-radius:3px;font-family:'IM Fell English',serif;font-size:14px;color:var(--ink);padding:8px 12px;appearance:none;cursor:pointer;text-align:center;}
.nssel:focus{outline:none;border-color:var(--blood);}
.nscfm{font-family:'Cinzel',serif;font-size:11px;font-weight:700;text-align:center;padding:3px 0;width:100%;}
.nscfm.r{color:var(--blood)}.nscfm.g{color:var(--green)}.nscfm.a{color:var(--amber);}
.nstags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%;}
.nstag{padding:4px 10px;border-radius:20px;font-family:'IM Fell English',serif;font-size:12px;border:1px solid;}
.nstag.wf{background:rgba(139,26,26,.1);border-color:var(--blood);color:var(--blood);}
.nstag.pk{background:rgba(180,50,100,.1);border-color:#c06090;color:#8b3060;}
.vtbox{width:100%;background:rgba(139,26,26,.1);border:1px solid rgba(139,26,26,.28);border-radius:4px;padding:10px;text-align:center;}
.vtlbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--blood);margin-bottom:4px;}
.vtnm{font-family:'Cinzel',serif;font-size:16px;color:var(--blood);font-weight:700;}
.ptog{width:100%;padding:9px 12px;border-radius:3px;border:1px solid;cursor:pointer;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;text-align:center;}
.ptog.off{background:transparent;border-color:rgba(45,90,61,.28);color:rgba(26,16,8,.38);}
.ptog.on{background:rgba(45,90,61,.16);border-color:var(--green);color:var(--green);font-weight:700;}
/* Récap */
.rc{width:100%;border-radius:4px;padding:10px 12px;border:1px solid;}
.rc.d{background:rgba(139,26,26,.07);border-color:rgba(139,26,26,.28);}
.rc.c{background:rgba(50,50,60,.07);border-color:rgba(100,100,120,.26);}
.rc.e{background:rgba(0,0,0,.1);border-color:rgba(245,230,200,.07);}
.rct{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:5px;}
.rc.d .rct{color:var(--blood)}.rc.c .rct{color:#8888aa}.rc.e .rct{color:rgba(245,230,200,.38);}
.rctx{font-family:'IM Fell English',serif;font-size:13px;color:var(--ink);line-height:1.4;}
/* Nav */
.nsnav{display:flex;gap:10px;padding:12px 16px 20px;flex-shrink:0;}
.nsbtn{padding:13px;border-radius:4px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;cursor:pointer;transition:all .2s;border:1px solid;text-transform:uppercase;}
.nsbtn.pv{flex:1;background:transparent;border-color:rgba(245,230,200,.13);color:rgba(245,230,200,.36);}
.nsbtn.pv:hover:not(:disabled){border-color:rgba(245,230,200,.3);color:rgba(245,230,200,.7);}
.nsbtn.pv:disabled{opacity:.18;cursor:not-allowed;}
.nsbtn.nx{flex:2;background:linear-gradient(135deg,var(--blood) 0%,#6b1111 100%);border-color:var(--blood);color:var(--parchment);box-shadow:0 4px 14px rgba(139,26,26,.28);}
.nsbtn.nx:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(139,26,26,.48);}
.nsbtn.fn{flex:2;background:linear-gradient(135deg,var(--green) 0%,#1a3d28 100%);border-color:var(--green);color:var(--parchment);box-shadow:0 4px 14px rgba(45,90,61,.28);}
</style>
</head>
<body>
<div id="root" class="app"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo}=React;

const ROLES={
  LOUP:{name:'Loup-Garou',emoji:'🐺',team:'loups',desc:"Se réveille chaque nuit avec les autres loups pour dévorer un villageois."},
  GRAND_MECHANT_LOUP:{name:'Grand Méchant Loup',emoji:'👹',team:'loups',desc:"Peut dévorer une 2ème victime tant qu'aucun loup n'est mort."},
  INFECT_PERE:{name:'Infect Père des Loups',emoji:'🦠',team:'loups',desc:"Une fois par partie, transforme la victime en loup au lieu de la tuer."},
  VILLAGEOIS:{name:'Simple Villageois',emoji:'👨‍🌾',team:'village',desc:"Aucun pouvoir. Vote le jour pour éliminer les suspects."},

const EVERY_NIGHT=[
  {role:'COMEDIEN',name:'Comédien'},{role:'VOYANTE',name:'Voyante'},{role:'RENARD',name:'Renard'},
  {role:'CORBEAU',name:'Corbeau'},{role:'SALVATORE',name:'Salvateur'},{role:'LOUP',name:'Tous les Loups'},
  {role:'INFECT_PERE',name:'Infect Père'},{role:'GRAND_MECHANT_LOUP',name:'Grand Méchant Loup'},

  {role:'JOUEUR_FLUTE',name:'Joueur de Flûte'},{role:'CHARMED',name:'Joueurs Charmés'},
];

const FIRST_NIGHT=[
  {role:'VILLAGEOIS',name:'Simple Villageois',note:'Se réveille et prend connaissance de son rôle.'},
  {role:'ANCIEN',name:'Ancien',note:'Se réveille et prend connaissance de son rôle.'},
  {role:'CHASSEUR',name:'Chasseur',note:'Se réveille et prend connaissance de son rôle.'},
  {role:'ANGE',name:'Ange',note:'Objectif : se faire éliminer par vote au 1er tour.'},
  {role:'ANGE_DECHU',name:'Ange Déchu',note:'Désigne secrètement une victime.'},

  {role:'ENFANT_SAUVAGE',name:'Enfant Sauvage',note:'Choisit son modèle en pointant du doigt.'},
  {role:'MONTREUR_OURS',name:"Montreur d'Ours",note:'Se réveille et prend connaissance de son rôle.'},
  {role:'CORBEAU',name:'Corbeau',note:'Désigne un joueur qui aura +2 voix au prochain vote.'},
  {role:'SALVATORE',name:'Salvateur',note:'Désigne un joueur à protéger cette nuit.'},

  {role:'INFECT_PERE',name:'Infect Père des Loups',note:'Peut transformer la victime en loup (1 fois par partie).'},
  {role:'GRAND_MECHANT_LOUP',name:'Grand Méchant Loup',note:"Peut désigner une 2ème victime tant qu'aucun loup n'est mort."},

const isWolf=p=>ROLES[p.role]?.team==='loups'||p.role==='LOUP_BLANC'||p.isInfected||(p.role==='CHIEN_LOUP'&&p.team==='loups')||(p.role==='ENFANT_SAUVAGE'&&p.turnedWolf);
const mkP=id=>({id,name:`Joueur ${id}`,role:null,alive:true,isInfected:false,team:null,turnedWolf:false,lover:false,loverId:null,bearGrowl:false,protected:false,enchanted:false,model:null,potionLifeUsed:false,potionDeathUsed:false,foxPower:true,angelTarget:null,infectUsed:false});

function App(){
  const [screen,setScreen]=useState('count');
  const [count,setCount]=useState(8);
  const [activeRoles,setActiveRoles]=useState({});
  const [players,setPlayers]=useState(()=>Array.from({length:8},(_,i)=>mkP(i+1)));
  const [selId,setSelId]=useState(null);
  const [showNight,setShowNight]=useState(false);
  const [nightIdx,setNightIdx]=useState(0);
  const [showEveryNight,setShowEveryNight]=useState(false);
  const [everyNightIdx,setEveryNightIdx]=useState(0);
  const [nightCount,setNightCount]=useState(1);
  const [na,setNaState]=useState({wolfVictim:null,corbeauTarget:null,salvateurTarget:null,potionLifeUsed:false,potionDeathTarget:null,voyanteTarget:null,loupBlancTarget:null,renardTargets:[null,null,null],infectTransform:false,gmgVictim:null,newEnchanted:[null,null]});
  const [lastNight,setLastNight]=useState(null); // récap nuit précédente
  const [voleurChosenRole,setVoleurChosenRole]=useState(null); // rôle choisi par le Voleur
  const [tooltip,setTooltip]=useState(null);
  const [showReset,setShowReset]=useState(false);
  const [resetKeep,setResetKeep]=useState([]);

  useEffect(()=>{
    setPlayers(prev=>{
      if(count>prev.length) return [...prev,...Array.from({length:count-prev.length},(_,i)=>mkP(prev.length+i+1))];
      return prev.slice(0,count);
    });
  },[count]);

  const totalR=Object.entries(activeRoles).reduce((s,[k,v])=>s+v*(k==='TROIS_FRERES'?3:k==='DEUX_SOEURS'?2:1),0);
  const voleurBonus2=(activeRoles['VOLEUR']||0)*2; // 2 cartes bonus pour le Voleur
  const rem=(count+voleurBonus2)-totalR;

  // Poids de chaque rôle (nombre de joueurs qu'il occupe)
  const roleWeight=rk=>rk==='TROIS_FRERES'?3:rk==='DEUX_SOEURS'?2:1;
  // Slots bonus accordés au meneur (Voleur nécessite 2 cartes supplémentaires)
  const voleurBonus=(activeRoles['VOLEUR']||0)*2;
  const totalRSlots=Object.entries(activeRoles).reduce((s,[k,v])=>s+v*roleWeight(k),0);

  const toggleRole=rk=>{
    const w=roleWeight(rk);
    setActiveRoles(prev=>{
      const cur=prev[rk]||0;
      const tot=Object.entries(prev).reduce((s,[k,v])=>s+v*roleWeight(k),0);
      // Clic gauche = ajouter si de la place, sinon retirer un
      if(tot+w<=count) return {...prev,[rk]:(cur||0)+1};
      if(cur>0){
        const next=cur-1;
        if(next===0){const{[rk]:_,...rest}=prev;return rest;}
        return {...prev,[rk]:next};
      }
      return prev;
    });
  };

  // Bear growl
  const bearGrowl=useMemo(()=>{
    const s={};
    players.forEach(p=>{
      if(p.role!=='MONTREUR_OURS') return;
      const idx=players.findIndex(x=>x.id===p.id);
      let L=null,R=null;
      for(let i=1;i<=players.length;i++){const ci=(idx-i+players.length)%players.length;if(players[ci].alive&&players[ci].id!==p.id){L=players[ci];break;}}
      for(let i=1;i<=players.length;i++){const ci=(idx+i)%players.length;if(players[ci].alive&&players[ci].id!==p.id){R=players[ci];break;}}
      s[p.id]=(L&&isWolf(L))||(R&&isWolf(R));
    });
    return s;
  },[players.map(p=>`${p.id}-${p.alive}-${p.role}-${p.team}-${p.turnedWolf}-${p.isInfected}`).join(',')]);

  useEffect(()=>{
    setPlayers(prev=>prev.map(p=>{
      if(p.role!=='MONTREUR_OURS') return p;
      const g=!!bearGrowl[p.id];
      return p.bearGrowl!==g?{...p,bearGrowl:g}:p;
    }));
  },[bearGrowl]);

  const stats=useMemo(()=>{
    const alive=players.filter(p=>p.alive);
    return{alive:alive.length,wolves:alive.filter(isWolf).length,village:alive.filter(p=>ROLES[p.role]?.team==='village'||ROLES[p.role]?.team==='variable').length};
  },[players.map(p=>`${p.id}-${p.alive}-${p.role}-${p.team}-${p.isInfected}-${p.turnedWolf}`).join(',')]);

  const toggleAlive=id=>{
    setPlayers(prev=>{
      const pl=prev.find(p=>p.id===id),nxt=!pl.alive;
      return prev.map(p=>{
        if(p.id===id) return{...p,alive:nxt};
        // Amoureux : si le joueur meurt, son amoureux meurt aussi
        if(!nxt&&pl.lover&&p.id===pl.loverId) return{...p,alive:false};
        // Enfant sauvage : si son modèle meurt, il devient loup
        if(!nxt&&p.role==='ENFANT_SAUVAGE'&&p.alive&&p.model===id) return{...p,turnedWolf:true,team:'loups'};
        return p;
      });
    });
  };

  const setNA=u=>setNaState(prev=>({...prev,...u}));

  const nightSlides=useMemo(()=>{
    const slides=FIRST_NIGHT.filter(s=>{
      if(s.role==='LOVER') return activeRoles['CUPIDON']>0;
      if(s.role==='CHARMED') return activeRoles['JOUEUR_FLUTE']>0;
      if(s.role==='LOUP') return Object.keys(activeRoles).some(k=>ROLES[k]?.team==='loups');
      return activeRoles[s.role]>0;
    });
    return[...slides,{role:'RECAP',name:'Récap de la Nuit',note:''}];
  },[activeRoles]);

  // Slides pour chaque nuit (filtrés par joueur vivant)
  const everyNightSlides=useMemo(()=>{
    const loupBlancActif=nightCount%2===0; // Se réveille nuits paires (2,4,6...)
    const EVERY_NIGHT_DETAIL=[
      {role:'COMEDIEN',  name:'Comédien',    note:'Choisit un pouvoir parmi les cartes au centre.'},
      {role:'VOYANTE',   name:'Voyante',     note:"Regarde secrètement la carte d'un joueur."},
      {role:'RENARD',    name:'Renard',      note:'Inspecte 3 joueurs adjacents.'},
      {role:'CORBEAU',   name:'Corbeau',     note:'Désigne un joueur qui aura +2 voix au prochain vote.'},
      {role:'SALVATORE', name:'Salvateur',   note:'Désigne un joueur à protéger cette nuit.'},
      {role:'LOUP',      name:'Tous les Loups-Garous', note:'Choisissent leur victime.'},
      {role:'INFECT_PERE',name:'Infect Père des Loups',note:'Peut transformer la victime en loup.'},
      {role:'GRAND_MECHANT_LOUP',name:'Grand Méchant Loup',note:"Peut désigner une 2ème victime."},
      {role:'LOUP_BLANC', name:'Loup Blanc', note:loupBlancActif?'Cette nuit il peut tuer un loup de son choix (non obligatoire).':'Nuit de repos — le Loup Blanc ne se réveille pas cette nuit.', actif:loupBlancActif},
      {role:'SORCIERE',  name:'Sorcière',    note:'Voit la victime. Peut utiliser ses potions.'},
      {role:'JOUEUR_FLUTE',name:'Joueur de Flûte',note:'Enchante 2 joueurs de son choix.'},
      {role:'CHARMED',   name:'Joueurs Charmés',note:'Les joueurs charmés se reconnaissent.'},
    ];
    const hasAlivePlayers=rk=>{
      if(rk==='LOUP') return players.some(p=>p.alive&&isWolf(p));
      if(rk==='CHARMED') return players.some(p=>p.alive&&p.enchanted);
      return players.some(p=>p.alive&&p.role===rk);
    };
    // Rôles qui nécessitent obligatoirement un joueur vivant pour être appelés
    const NEEDS_ALIVE_PLAYER=['VOYANTE','CORBEAU','SALVATORE','SORCIERE','RENARD','COMEDIEN',
      'INFECT_PERE','GRAND_MECHANT_LOUP','JOUEUR_FLUTE'];

    const slides=EVERY_NIGHT_DETAIL.filter(s=>{
      if(s.role==='CHARMED') return activeRoles['JOUEUR_FLUTE']>0 && players.some(p=>p.alive&&p.enchanted);
      if(s.role==='LOUP') return Object.keys(activeRoles).some(k=>ROLES[k]?.team==='loups'||k==='LOUP_BLANC') && players.some(p=>p.alive&&isWolf(p));
      if(s.role==='LOUP_BLANC') return activeRoles['LOUP_BLANC']>0 && players.some(p=>p.alive&&p.role==='LOUP_BLANC');
      // Rôles nécessitant un joueur vivant : on vérifie qu'il est bien en vie
      if(NEEDS_ALIVE_PLAYER.includes(s.role)) return activeRoles[s.role]>0 && hasAlivePlayers(s.role);
      // Autres rôles bonus (sans joueur assigné) : juste vérifier activeRoles
      return activeRoles[s.role]>0;
    });
    return [...slides,{role:'RECAP',name:'Récap de la Nuit',note:''}];
  },[activeRoles, nightCount, players.map(p=>`${p.id}-${p.alive}-${p.role}`).join(',')]);

  const applyNight=()=>{
    const saved=na.salvateurTarget&&na.wolfVictim&&na.salvateurTarget===na.wolfVictim;
    const psaved=na.potionLifeUsed&&na.wolfVictim;
    // Un seul setPlayers qui gère TOUT
    setPlayers(prev => {
      // 1. Calculer les morts directs cette nuit
      const justDied = new Set();
      if(na.wolfVictim && !saved && !psaved && !na.infectTransform) justDied.add(na.wolfVictim);
      if(na.gmgVictim) justDied.add(na.gmgVictim);
      if(na.potionDeathTarget) justDied.add(na.potionDeathTarget);
      if(na.loupBlancTarget) justDied.add(na.loupBlancTarget);

      return prev.map(p => {
        let u = {...p};

        // Mort directe
        if(justDied.has(p.id)) u.alive = false;

        // Victime loups : infectée ou morte
        if(p.id===na.wolfVictim && !saved && !psaved) {
          if(na.infectTransform){ u.isInfected=true; u.team='loups'; u.alive=true; }
          else u.alive=false;
        }

        // Effets non-mortels
        if(p.id===na.corbeauTarget) u.cursed=true;
        // Joueur de Flûte : appliquer les nouveaux enchantements
        if(na.newEnchanted && na.newEnchanted.includes(p.id)) u.enchanted=true;
        if(p.id===na.salvateurTarget) u.protected=true;

        // Infect père : marquer pouvoir utilisé
        if(p.role==='INFECT_PERE' && na.infectTransform) u.infectUsed=true;

        // Sorcière : marquer potions utilisées de façon PERMANENTE sur le joueur
        if(p.role==='SORCIERE') {
          if(na.potionLifeUsed) u.potionLifeUsed=true;
          if(na.potionDeathTarget) u.potionDeathUsed=true;
        }

        // Renard : perd son pouvoir si aucun loup parmi ses 3 cibles
        if(p.role==='RENARD' && p.alive && na.renardTargets.some(id=>id!==null)) {
          const hasWolf = na.renardTargets.some(id=>{const t=prev.find(x=>x.id===id);return t&&isWolf(t);});
          if(!hasWolf) u.foxPower=false;
        }

        // Amoureux : si l'aimé meurt cette nuit, mourir aussi
        if(u.alive && u.lover && u.loverId && justDied.has(u.loverId)) u.alive=false;

        // Enfant sauvage : si son modèle meurt cette nuit, devient loup
        if(u.role==='ENFANT_SAUVAGE' && u.alive && u.model && justDied.has(u.model)) {
          u.turnedWolf=true; u.team='loups';
        }

        return u;
      });
    });
    // Sauvegarder le récap avant de reset
    const salSaved2=na.salvateurTarget&&na.wolfVictim&&na.salvateurTarget===na.wolfVictim;
    const psaved2=na.potionLifeUsed&&na.wolfVictim;
    // Capturer l'état AVANT reset pour le récap complet
    const enchantedThisNight=players.filter(p=>p.enchanted&&p.alive);
    const chienLoupPlayer=players.find(p=>p.role==='CHIEN_LOUP');
    const angeDechuPlayer=players.find(p=>p.role==='ANGE_DECHU');
    const renardPlayer2=players.find(p=>p.role==='RENARD'&&p.alive);
    // Capturer données supplémentaires
    const cupidonPlayer=players.find(p=>p.role==='CUPIDON');
    const lovers=players.filter(p=>p.lover);
    const voleurPlayer=players.find(p=>p.role==='VOLEUR'||voleurChosenRole);
    const comedienPlayer=players.find(p=>p.role==='COMEDIEN');
    const ancienPlayer=players.find(p=>p.role==='ANCIEN');
    const sorcierePlayer=players.find(p=>p.role==='SORCIERE');
    const esPlayer=players.find(p=>p.role==='ENFANT_SAUVAGE');
    const flutePlayer=players.find(p=>p.role==='JOUEUR_FLUTE');
    setLastNight({
      nightNumber:nightCount,
      isFirstNight:nightCount===1,
      // Loups
      wolfVictimId:na.wolfVictim,
      wolfVictimSaved:salSaved2||psaved2,
      saviorType:salSaved2?'salvateur':psaved2?'potion':null,
      gmgVictimId:na.gmgVictim,
      infectTransformed:na.infectTransform&&na.wolfVictim?na.wolfVictim:null,
      loupBlancId:na.loupBlancTarget,
      // Village
      salvateurId:na.salvateurTarget,
      corbeauId:na.corbeauTarget,
      potionDeathId:na.potionDeathTarget,
      potionLifeUsed:na.potionLifeUsed&&!!na.wolfVictim,
      potionLifeTargetId:na.potionLifeUsed?na.wolfVictim:null,
      voyanteTargetId:na.voyanteTarget,
      voyanteTargetIsWolf:na.voyanteTarget?isWolf(players.find(p=>p.id===na.voyanteTarget)||{}):null,
      renardTargetIds:na.renardTargets.filter(Boolean),
      renardResult:na.renardTargets.some(id=>id!==null)?na.renardTargets.some(id=>{const t=players.find(p=>p.id===id);return t&&isWolf(t);}):null,
      renardLostPower:renardPlayer2&&na.renardTargets.some(id=>id!==null)&&!na.renardTargets.some(id=>{const t=players.find(p=>p.id===id);return t&&isWolf(t);}),
      // Flûte
      newEnchantedIds:na.newEnchanted.filter(Boolean),
      enchantedIds:[...new Set([...enchantedThisNight.map(p=>p.id),...na.newEnchanted.filter(Boolean)])],
      flutePlayerId:flutePlayer?.id,
      // Cupidon
      cupidonId:cupidonPlayer?.id,
      loversIds:lovers.map(p=>p.id),
      // Voleur
      voleurId:players.find(p=>p.role==='VOLEUR')?.id,
      voleurChosenRole:voleurChosenRole||null,
      // Comédien
      comedienId:comedienPlayer?.id,
      // Chien-Loup
      chienLoupId:chienLoupPlayer?.id,
      chienLoupCamp:chienLoupPlayer?.team,
      // Enfant Sauvage
      enfantSauvageId:esPlayer?.id,
      enfantSauvageModelId:esPlayer?.model,
      // Ange Déchu
      angeDechuId:angeDechuPlayer?.id,
      angeDechuTargetId:angeDechuPlayer?.angelTarget,
    });
    setNaState({wolfVictim:null,corbeauTarget:null,salvateurTarget:null,potionLifeUsed:false,potionDeathTarget:null,voyanteTarget:null,loupBlancTarget:null,renardTargets:[null,null,null],infectTransform:false,gmgVictim:null,newEnchanted:[null,null]});
    // Fermer les deux modals sans changer d'écran
    setShowNight(false);
    setShowEveryNight(false);
  };

  const assignRole=(pid,rk)=>setPlayers(prev=>prev.map(p=>p.id===pid?{...p,role:rk,team:ROLES[rk]?.team||null}:p));

  const openReset=()=>{
    setResetKeep(players.map(p=>({id:p.id,name:p.name,keep:true})));
    setShowReset(true);
  };
  const confirmReset=()=>{
    const kept=resetKeep.filter(p=>p.keep);
    setPlayers(kept.map((p,i)=>({...mkP(i+1),name:p.name})));
    setCount(kept.length);
    setActiveRoles({});
    setNightCount(1);
    setNaState({wolfVictim:null,corbeauTarget:null,salvateurTarget:null,potionLifeUsed:false,potionDeathTarget:null,voyanteTarget:null,loupBlancTarget:null,renardTargets:[null,null,null],infectTransform:false,gmgVictim:null,newEnchanted:[null,null]});
    setVoleurChosenRole(null);
    setShowReset(false);
    setScreen('roles');
  };

  /* ── ÉCRAN 1 : COUNT ── */
  if(screen==='count') return(
    <div className="cs">
      <div className="ph">
        <div className="logo-slot"><img src="logo.png" alt="Loups-Garous" onError={e=>{e.target.style.display='none';}}/></div>
      </div>
      <div className="orn">✦</div>
      <div className="cs-card parch">
        <div className="stitle">✦ Combien de joueurs ?</div>
        <div className="cn">
          <div style={{fontFamily:"'Cinzel',serif",fontSize:'13px',fontWeight:'700',letterSpacing:'.3em',textTransform:'uppercase',color:'rgba(245,230,200,.7)',marginBottom:'4px'}}>Joueurs</div>
          <div className="cn-num">{count}</div>
          <div className="cn-unit">joueurs</div>
        </div>
        <div className="slider-wrap">
          <input type="range" min="5" max="24" value={count} onChange={e=>setCount(+e.target.value)}/>
          <div className="slider-lbl"><span>5</span><span>24</span></div>
        </div>
        <button className="btn-p" onClick={()=>setScreen('roles')}>Choisir les rôles →</button>
      </div>
      <p style={{fontFamily:"'Cinzel',serif",fontSize:'11px',letterSpacing:'.25em',color:'rgba(245,230,200,.45)',marginTop:'28px',textTransform:'uppercase',textAlign:'center'}}>Play Thau'Gether</p>
    </div>
  );

  /* ── ÉCRAN 2 : RÔLES ── */
  const incRole=rk=>{
    const w=roleWeight(rk);
    setActiveRoles(prev=>{
      const bonus=(prev['VOLEUR']||0)*2;
      const tot=Object.entries(prev).reduce((s,[k,v])=>s+v*roleWeight(k),0);
      if(tot+w>count+bonus) return prev;
      return {...prev,[rk]:(prev[rk]||0)+1};
    });
  };
  const decRole=rk=>{
    setActiveRoles(prev=>{
      const cur=prev[rk]||0; if(cur===0) return prev;
      const next=cur-1;
      if(next===0){const{[rk]:_,...rest}=prev;return rest;}
      return {...prev,[rk]:next};
    });
  };

  if(screen==='roles') return(
    <div className="rs" onClick={()=>setTooltip(null)}>
      <div className="ph">
        <div className="logo-slot"><img src="logo.png" alt="Loups-Garous" onError={e=>{e.target.style.display='none';}}/></div>
        <p style={{fontSize:'13px',letterSpacing:'.25em',color:'rgba(245,230,200,.75)',fontWeight:'600'}}>Sélection des Rôles</p>
      </div>
      <div className="orn">✦</div>

      {/* Layout 2 colonnes : joueurs | rôles */}
      <div style={{width:'100%',maxWidth:'860px',display:'grid',gridTemplateColumns:'200px 1fr',gap:'12px',padding:'0 14px'}}>

        {/* Colonne joueurs */}
        <div className="parch" style={{alignSelf:'start'}}>
          <div className="stitle">✦ Joueurs</div>
          {players.map(p=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:'6px',padding:'5px 0',borderBottom:'1px solid rgba(139,100,30,.12)'}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:'10px',color:'var(--blood)',width:'16px',flexShrink:0}}>{p.id}</span>
              <input
                value={p.name}
                onChange={e=>setPlayers(prev=>prev.map(x=>x.id===p.id?{...x,name:e.target.value}:x))}
                onFocus={e=>e.target.select()}
                style={{flex:1,background:'transparent',border:'none',borderBottom:'1px dashed rgba(139,100,30,.3)',fontFamily:"'IM Fell English',serif",fontSize:'clamp(15px,2.5vw,18px)',color:'var(--ink)',padding:'3px 3px',outline:'none',minWidth:0}}
              />
            </div>
          ))}
        </div>

        {/* Colonne rôles */}
        <div className="parch">
          <div className="rc-header">
            <div className="stitle" style={{marginBottom:0}}>✦ Rôles</div>
            <div className={`rc-count ${rem===0?'ok':'warn'}`}>
              {totalR} / {count}
              {rem>0&&<span style={{fontFamily:"'IM Fell English',serif",fontStyle:'italic',fontSize:'11px',marginLeft:'6px'}}>({rem} restant{rem>1?'s':''})</span>}
              {rem<0&&<span style={{fontFamily:"'IM Fell English',serif",fontStyle:'italic',fontSize:'11px',marginLeft:'6px'}}>({Math.abs(rem)} en trop)</span>}
            </div>
          </div>

          {Object.entries(TEAMS).map(([team,{label,keys}])=>(
            <div key={team} className="team-blk">
              <div className={`team-hdr ${team}`}>{label}</div>
              <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                {[...keys].sort((a,b)=>ROLES[a]?.name.localeCompare(ROLES[b]?.name,'fr')).map(rk=>{
                  const r=ROLES[rk],cnt=activeRoles[rk]||0,on=cnt>0;
                  return(
                    <div key={rk}
                      className={`rchip ${on?`on-${r.team}`:''}`}
                      style={{justifyContent:'space-between',padding:'8px 10px'}}>
                      <span style={{display:'flex',alignItems:'center',gap:'6px',flex:1,minWidth:0}}>
                        <span style={{fontSize:'18px'}}>{r.emoji}</span>
                        <span style={{fontSize:'clamp(13px,2vw,15px)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</span>
                        <button onClick={e=>{e.stopPropagation();setTooltip(tooltip===rk?null:rk);}}
                          style={{background:'none',border:'none',color:on?'currentColor':'rgba(26,16,8,.28)',cursor:'pointer',fontSize:'14px',padding:'0 2px',lineHeight:1,flexShrink:0}}>ℹ️</button>
                      </span>
                      <span style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}} onClick={e=>e.stopPropagation()}>
                        <button onClick={()=>decRole(rk)} disabled={cnt===0}
                          style={{width:'28px',height:'28px',borderRadius:'4px',border:`1px solid ${on?'currentColor':'rgba(26,16,8,.2)'}`,background:'transparent',color:on?'currentColor':'rgba(26,16,8,.3)',cursor:cnt===0?'not-allowed':'pointer',fontSize:'18px',lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center',opacity:cnt===0?.3:1,fontWeight:'bold'}}>−</button>
                        <span style={{fontFamily:"'Cinzel',serif",fontSize:'14px',fontWeight:'700',minWidth:'20px',textAlign:'center'}}>{cnt||0}</span>
                        <button onClick={()=>incRole(rk)}
                          style={{width:'28px',height:'28px',borderRadius:'4px',border:`1px solid ${on?'currentColor':'rgba(26,16,8,.2)'}`,background:on?'rgba(0,0,0,.08)':'transparent',color:on?'currentColor':'rgba(26,16,8,.4)',cursor:'pointer',fontSize:'18px',lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'bold'}}>+</button>
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}

          <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
            <button className="btn-g" onClick={()=>setScreen('count')}>← Retour</button>
            <button className="btn-p" style={{flex:1}} disabled={rem!==0}
              onClick={()=>setScreen('game')}>
              {rem===0?'⚔ Commencer la Partie ⚔':rem>0?`Encore ${rem} rôle${rem>1?'s':''}`:`${Math.abs(rem)} rôle${Math.abs(rem)>1?'s':''} en trop`}
            </button>
          </div>
        </div>
      </div>

      {tooltip&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}
          onClick={()=>setTooltip(null)}>
          <div style={{background:'linear-gradient(145deg,var(--parchment),var(--parchment-dark))',borderRadius:'8px',padding:'24px 20px',maxWidth:'340px',width:'100%',boxShadow:'0 8px 40px rgba(0,0,0,.8)',border:'1px solid rgba(201,168,76,.35)',position:'relative'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:'center',marginBottom:'12px'}}>
              <div style={{fontSize:'52px',marginBottom:'6px'}}>{ROLES[tooltip]?.emoji}</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:'18px',fontWeight:'700',color:'var(--ink)',marginBottom:'4px'}}>{ROLES[tooltip]?.name}</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:'9px',letterSpacing:'.2em',textTransform:'uppercase',color:({loups:'var(--blood)',village:'var(--green)',solo:'var(--purple)',variable:'var(--amber)'})[ROLES[tooltip]?.team]||'var(--ink)'}}>{({loups:'⚔ Loups',village:'🌿 Village',solo:'⭐ Solo',variable:'🌀 Variable'})[ROLES[tooltip]?.team]}</div>
            </div>
            <div style={{width:'100%',height:'1px',background:'linear-gradient(to right,transparent,rgba(139,100,30,.3),transparent)',marginBottom:'12px'}}/>
            <p style={{fontFamily:"'IM Fell English',serif",fontSize:'14px',fontStyle:'italic',color:'rgba(26,16,8,.72)',lineHeight:1.6,textAlign:'center'}}>{ROLES[tooltip]?.desc}</p>
            <button onClick={()=>setTooltip(null)} style={{marginTop:'16px',width:'100%',padding:'10px',background:'rgba(26,16,8,.08)',border:'1px solid rgba(26,16,8,.18)',borderRadius:'4px',fontFamily:"'Cinzel',serif",fontSize:'11px',letterSpacing:'.1em',cursor:'pointer',color:'rgba(26,16,8,.55)',textTransform:'uppercase'}}>Fermer</button>
          </div>
        </div>
      )}
      <p style={{fontFamily:"'Cinzel',serif",fontSize:'10px',letterSpacing:'.2em',color:'rgba(245,230,200,.4)',padding:'12px 14px',textTransform:'uppercase',textAlign:'center'}}>Play Thau'Gether</p>
    </div>
  );

  /* ── ÉCRAN 3 : JEU ── */
  const n=players.length,cx=50,cy=50,rv=38;
  // Un rôle n'apparaît dans la bande que si le joueur qui l'a est encore vivant
  const NEEDS_ALIVE=['VOYANTE','CORBEAU','SALVATORE','SORCIERE','RENARD','COMEDIEN',
    'INFECT_PERE','GRAND_MECHANT_LOUP','JOUEUR_FLUTE','LOUP_BLANC'];
  const nightBarItems=EVERY_NIGHT.filter(it=>{
    if(it.role==='CHARMED') return activeRoles['JOUEUR_FLUTE']>0 && players.some(p=>p.alive&&p.enchanted);
    if(it.role==='LOUP') return Object.keys(activeRoles).some(k=>ROLES[k]?.team==='loups'||k==='LOUP_BLANC') && players.some(p=>p.alive&&isWolf(p));
    // Rôles avec joueur : seulement si ce joueur est vivant
    if(NEEDS_ALIVE.includes(it.role)) return activeRoles[it.role]>0 && players.some(p=>p.alive&&p.role===it.role);
    return activeRoles[it.role]>0;
  });
  const bear=players.find(p=>p.role==='MONTREUR_OURS'&&p.alive);
  const availRoles=Object.keys(activeRoles);

  const lastNightVictim=lastNight?.wolfVictimId?players.find(p=>p.id===lastNight.wolfVictimId):null;
  const lastNightPoisoned=lastNight?.potionDeathId?players.find(p=>p.id===lastNight.potionDeathId):null;
  const lastNightCorbeau=lastNight?.corbeauId?players.find(p=>p.id===lastNight.corbeauId):null;
  const lastNightLB=lastNight?.loupBlancId?players.find(p=>p.id===lastNight.loupBlancId):null;

  return(
    <div className="gs">
      {/* ── HEADER JEU ── */}
      <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',padding:'6px 0',minHeight:'56px'}}>
        {/* Logo PNG — position absolue à gauche */}
        <div style={{position:'absolute',left:0,display:'flex',alignItems:'center'}}>
          <img src="logo.png" alt="" style={{height:'48px',width:'auto',objectFit:'contain',opacity:.9,display:'block'}} onError={e=>{e.target.style.display='none';}}/>
        </div>
        {/* Centre parfaitement centré */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}>
          <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:'clamp(20px,4vw,30px)',color:'var(--gold-bright)',letterSpacing:'.05em',textShadow:'0 0 20px rgba(201,168,76,.5)',lineHeight:1}}>NUIT {nightCount}</div>
          <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:'12px',letterSpacing:'.1em',color:'rgba(220,80,80,.9)',background:'rgba(139,26,26,.2)',border:'1px solid rgba(139,26,26,.4)',borderRadius:'3px',padding:'2px 8px'}}>🐺 {stats.wolves} loup{stats.wolves>1?'s':''}</span>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:'12px',letterSpacing:'.1em',color:'rgba(80,200,120,.9)',background:'rgba(45,90,61,.2)',border:'1px solid rgba(45,90,61,.4)',borderRadius:'3px',padding:'2px 8px'}}>🌿 {stats.village} village</span>
          </div>
        </div>
        {/* Reset — position absolue à droite */}
        <div style={{position:'absolute',right:0}}>
          <button className="ibtn" title="Nouvelle partie" onClick={openReset}>🔄</button>
        </div>
      </div>

      {/* ── BANDEAU OURS — au-dessus de la table ── */}
      {bear&&bear.bearGrowl&&(
        <div style={{
          background:'linear-gradient(135deg,rgba(139,26,26,.4),rgba(80,5,5,.45))',
          border:'2px solid rgba(200,50,50,.75)',
          borderRadius:'6px',padding:'10px 20px',
          display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',
          animation:'bpls 1.2s ease-in-out infinite',
        }}>
          <span style={{fontSize:'32px'}}>🐻</span>
          <div>
            <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:'16px',color:'#ff5555',letterSpacing:'.05em'}}>L'OURS GROGNE !</div>
            <div style={{fontFamily:"'IM Fell English',serif",fontSize:'13px',fontStyle:'italic',color:'rgba(255,160,160,.85)'}}>Un voisin de {bear.name} est un loup</div>
          </div>
        </div>
      )}
      {bear&&!bear.bearGrowl&&(
        <div style={{
          background:'rgba(45,90,61,.1)',border:'1px solid rgba(45,90,61,.25)',
          borderRadius:'4px',padding:'5px 14px',
          display:'flex',alignItems:'center',gap:'8px',
        }}>
          <span style={{fontSize:'16px'}}>🐻</span>
          <span style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',color:'rgba(100,180,120,.65)',fontStyle:'italic'}}>L'ours de {bear.name} est calme</span>
        </div>
      )}

      {/* ── CERCLE TABLE ── */}
      <div style={{display:'flex',justifyContent:'center'}}>
        <div className="board" style={{margin:0,width:'min(100vw, 100vh - 200px)',maxWidth:'680px'}}>
        <svg viewBox="-5 -5 110 115" className="csvg">
          <circle cx={cx} cy={cy} r="13" fill="rgba(201,168,76,.05)" stroke="rgba(201,168,76,.2)" strokeWidth=".6"/>
          <text x={cx} y={cy-2} textAnchor="middle" style={{fontFamily:"'Cinzel',serif",fontSize:'3.5px',fill:'rgba(201,168,76,.5)',letterSpacing:'.15em'}}>NUIT</text>
          <text x={cx} y={cy+3} textAnchor="middle" style={{fontFamily:"'Cinzel Decorative',serif",fontSize:'6px',fill:'rgba(201,168,76,.7)',fontWeight:'bold'}}>{nightCount}</text>
          {players.filter(p=>p.lover&&p.loverId&&p.id<p.loverId).map(p=>{
            const pi=players.findIndex(x=>x.id===p.id),li=players.findIndex(x=>x.id===p.loverId);
            const a1=(360/n)*pi-90,a2=(360/n)*li-90;
            const x1=cx+rv*Math.cos(a1*Math.PI/180),y1=cy+rv*Math.sin(a1*Math.PI/180);
            const x2=cx+rv*Math.cos(a2*Math.PI/180),y2=cy+rv*Math.sin(a2*Math.PI/180);
            return <line key={p.id} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#c06090" strokeWidth=".3" strokeDasharray="1,.8" opacity=".5"/>;
          })}
          {/* Ligne pointillée verte : Enfant Sauvage → son modèle */}
          {players.filter(p=>p.role==='ENFANT_SAUVAGE'&&p.model&&p.alive).map(p=>{
            const es=players.find(x=>x.id===p.id), mo=players.find(x=>x.id===p.model);
            if(!mo) return null;
            const pi=players.findIndex(x=>x.id===es.id),mi=players.findIndex(x=>x.id===mo.id);
            const a1=(360/n)*pi-90,a2=(360/n)*mi-90;
            const x1=cx+rv*Math.cos(a1*Math.PI/180),y1=cy+rv*Math.sin(a1*Math.PI/180);
            const x2=cx+rv*Math.cos(a2*Math.PI/180),y2=cy+rv*Math.sin(a2*Math.PI/180);
            return <g key={`es-${p.id}`}>
              <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#88cc44" strokeWidth=".4" strokeDasharray="1.2,.6" opacity=".7"/>
              <text x={(x1+x2)/2} y={(y1+y2)/2-1} textAnchor="middle" style={{fontSize:'3px',fill:'#88cc44',opacity:.8}}>🧒</text>
            </g>;
          })}
          {players.map((p,i)=>{
            const angle=(360/n)*i-90,rad=angle*Math.PI/180;
            const px=cx+rv*Math.cos(rad),py=cy+rv*Math.sin(rad);
            const dead=!p.alive,wolf=isWolf(p),role=ROLES[p.role];
            const ring=dead?'rgba(100,80,60,.32)':wolf?'rgba(139,26,26,.82)':role?.team==='village'?'rgba(45,90,61,.68)':role?.team==='solo'?'rgba(74,32,96,.68)':'rgba(201,168,76,.5)';
            const bg=dead?'rgba(40,30,20,.88)':wolf?'rgba(72,7,7,.9)':'rgba(20,14,5,.9)';
            const tc=dead?'rgba(180,150,100,.35)':wolf?'#ff9999':'#f5e6c8';
            return(
              <g key={p.id} className="pnode" onClick={()=>setSelId(p.id)} transform={`translate(${px},${py})`}>
                {p.bearGrowl&&p.alive&&(<>
                  {/* Halo rouge solide fixe */}
                  <circle r="10.5" fill="none" stroke="rgba(220,50,50,.9)" strokeWidth="2"/>
                  {/* Anneau pulsant */}
                  <circle r="10" fill="none" stroke="rgba(255,80,80,.7)" strokeWidth="1.5">
                    <animate attributeName="r" values="10;14;10" dur="1.2s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values=".8;0;.8" dur="1.2s" repeatCount="indefinite"/>
                    <animate attributeName="stroke-width" values="1.5;0.5;1.5" dur="1.2s" repeatCount="indefinite"/>
                  </circle>
                  {/* Petit symbole 🐻 au-dessus du cercle */}
                  <text textAnchor="middle" y="-12" style={{fontSize:'4px',fill:'#ff6666'}}>🐻!</text>
                </>)}
                <circle r="8" fill={bg} stroke={ring} strokeWidth={dead?.38:.95} strokeOpacity={dead?.32:.88}/>
                <text textAnchor="middle" y="0" dominantBaseline="central" style={{fontSize:dead?'7.5px':'9px',opacity:dead?.38:1}}>{role?.emoji||'❓'}</text>
                <text textAnchor="middle" y="12" style={{fontFamily:"'IM Fell English',serif",fontSize:'3.8px',fill:tc,fontStyle:dead?'italic':'normal'}}>
                  {p.name.length>8?p.name.slice(0,7)+'…':p.name}
                </text>
                {dead&&<>
                  <line x1="-5" y1="-5" x2="5" y2="5" stroke="rgba(139,26,26,.42)" strokeWidth=".75"/>
                  <line x1="5" y1="-5" x2="-5" y2="5" stroke="rgba(139,26,26,.42)" strokeWidth=".75"/>
                </>}
              </g>
            );
          })}
        </svg>
        </div>
      </div>

      {/* ══ PANNEAU BAS — HORIZONTAL ══ */}
      <div style={{width:'100%',marginTop:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>

        {/* Boutons côte à côte */}
        <div style={{display:'flex',gap:'10px'}}>
          <button onClick={()=>{setNightIdx(0);setShowNight(true);}}
            style={{flex:1,padding:'14px',background:'linear-gradient(135deg,rgba(80,40,120,.4),rgba(40,10,80,.45))',border:'1px solid rgba(140,100,200,.55)',borderRadius:'6px',color:'#ddbbff',fontFamily:"'Cinzel',serif",fontSize:'13px',letterSpacing:'.06em',cursor:'pointer',textTransform:'uppercase',textAlign:'center'}}>
            🌙 1ère nuit
          </button>
          <button onClick={()=>{setEveryNightIdx(0);setShowEveryNight(true);}}
            style={{flex:1,padding:'14px',background:'linear-gradient(135deg,rgba(201,168,76,.22),rgba(120,90,20,.22))',border:'1px solid rgba(201,168,76,.45)',borderRadius:'6px',color:'var(--gold-bright)',fontFamily:"'Cinzel',serif",fontSize:'13px',letterSpacing:'.06em',cursor:'pointer',textTransform:'uppercase',textAlign:'center'}}>
            ✦ Nuit suivante
          </button>
        </div>
        {/* Récap + Ordre de nuit côte à côte */}
        <div style={{display:'flex',gap:'10px',alignItems:'flex-start'}}>

          {lastNight&&(
            <div style={{flex:2,background:'linear-gradient(160deg,var(--parchment) 0%,var(--parchment-dark) 100%)',borderRadius:'6px',border:'1px solid rgba(201,168,76,.28)',padding:'12px',maxHeight:'220px',overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px',borderBottom:'1px solid rgba(139,100,30,.2)',paddingBottom:'6px'}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:'10px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--blood)'}}>📜 Résumé — Nuit {lastNight.nightNumber}</div>
                {(()=>{
                  const nd=[];
                  if(lastNight.wolfVictimId&&!lastNight.wolfVictimSaved) nd.push(lastNight.wolfVictimId);
                  if(lastNight.gmgVictimId) nd.push(lastNight.gmgVictimId);
                  if(lastNight.potionDeathId) nd.push(lastNight.potionDeathId);
                  if(lastNight.loupBlancId) nd.push(lastNight.loupBlancId);
                  const unique=[...new Set(nd)];
                  return <div style={{fontFamily:"'Cinzel',serif",fontSize:'11px',fontWeight:'700',color:unique.length===0?'var(--green)':'var(--blood)',background:unique.length===0?'rgba(45,90,61,.15)':'rgba(139,26,26,.12)',border:`1px solid ${unique.length===0?'var(--green)':'var(--blood)'}`,borderRadius:'10px',padding:'2px 10px'}}>💀 {unique.length} mort{unique.length>1?'s':''}</div>;
                })()}
              </div>
              {(()=>{
                const S=({color='var(--blood)',children})=><div style={{fontFamily:"'Cinzel',serif",fontSize:'9px',letterSpacing:'.1em',color,marginBottom:'3px',textTransform:'uppercase',fontWeight:'700'}}>{children}</div>;
                const V=({children,bold})=><div style={{fontFamily:"'IM Fell English',serif",fontSize:'13px',color:'#1a1008',fontWeight:bold?'900':'normal',lineHeight:1.3}}>{children}</div>;
                const Bloc=({children})=><div style={{borderTop:'1px solid rgba(139,100,30,.2)',paddingTop:'5px',marginTop:'4px'}}>{children}</div>;
                const N=(id)=>players.find(p=>p.id===id)?.name||'?';
                const events=[];

                // ── MORTS
                const lnv=lastNight?.wolfVictimId?players.find(p=>p.id===lastNight.wolfVictimId):null;
                if(lnv) events.push(<Bloc key="w"><S>🐺 Dévoré par les loups</S><V bold>{lnv.name} <span style={{fontSize:'10px',opacity:.6}}>({ROLES[lnv.role]?.name})</span></V>{lastNight.wolfVictimSaved&&<V><span style={{color:'var(--green)',fontSize:'11px'}}>{lastNight.saviorType==='salvateur'?'🛡️ Sauvé par le Salvateur':'🧪 Sauvé par la potion'}</span></V>}</Bloc>);
                else events.push(<Bloc key="nw"><V><span style={{fontStyle:'italic',color:'rgba(26,16,8,.45)',fontSize:'11px'}}>Aucune victime des loups</span></V></Bloc>);
                if(lastNight.gmgVictimId) events.push(<Bloc key="g"><S>👹 2ème victime (Grand Méchant Loup)</S><V bold>{N(lastNight.gmgVictimId)} <span style={{fontSize:'10px',opacity:.6}}>({ROLES[players.find(p=>p.id===lastNight.gmgVictimId)?.role]?.name})</span></V></Bloc>);
                if(lastNight.infectTransformed) events.push(<Bloc key="inf"><S>🦠 Transformé en loup (Infect Père)</S><V bold>{N(lastNight.infectTransformed)}</V></Bloc>);
                if(lastNight.loupBlancId) events.push(<Bloc key="lb"><S>🤍 Tué par le Loup Blanc</S><V bold>{N(lastNight.loupBlancId)}</V></Bloc>);
                const lnp=lastNight?.potionDeathId?players.find(p=>p.id===lastNight.potionDeathId):null;
                if(lnp) events.push(<Bloc key="pd"><S color="var(--purple)">☠️ Tué par la potion de mort</S><V bold>{lnp.name}</V></Bloc>);

                // ── SAUVETAGES / PROTECTION
                if(lastNight.potionLifeUsed&&lastNight.potionLifeTargetId) events.push(<Bloc key="pv"><S color="var(--green)">🧪 Potion de vie utilisée</S><V bold>{N(lastNight.potionLifeTargetId)} — survit</V></Bloc>);
                if(lastNight.salvateurId) events.push(<Bloc key="salv"><S color="var(--green)">🛡️ Protégé par le Salvateur</S><V bold>{N(lastNight.salvateurId)}</V></Bloc>);

                // ── CORBEAU
                if(lastNight.corbeauId) events.push(<Bloc key="corb"><S color="rgba(80,80,130,1)">🦅 Curseur Corbeau (+2 votes)</S><V bold>{N(lastNight.corbeauId)}</V></Bloc>);

                // ── VOYANTE
                if(lastNight.voyanteTargetId) events.push(<Bloc key="voy"><S color="rgba(80,60,120,1)">🔮 Voyante a inspecté</S><V bold>{N(lastNight.voyanteTargetId)}</V><V><span style={{color:lastNight.voyanteTargetIsWolf?'var(--blood)':'var(--green)',fontSize:'11px'}}>{lastNight.voyanteTargetIsWolf?"🐺 C'est un loup !":'✅ Pas un loup'}</span></V></Bloc>);

                // ── RENARD
                if(lastNight.renardTargetIds?.length) events.push(<Bloc key="ren"><S color="var(--amber)">🦊 Renard a inspecté</S><V>{lastNight.renardTargetIds.map(id=>N(id)).join(', ')}</V><V><span style={{color:lastNight.renardResult?'var(--blood)':'var(--green)',fontSize:'11px'}}>{lastNight.renardResult?"🐺 Loup détecté !":'Aucun loup'}{lastNight.renardLostPower?' — pouvoir perdu':''}</span></V></Bloc>);

                // ── FLÛTE
                if(lastNight.newEnchantedIds?.length) events.push(<Bloc key="flute"><S color="var(--purple)">🎵 Nouveaux enchantés (Flûte)</S><V bold>{lastNight.newEnchantedIds.map(id=>N(id)).join(' & ')}</V>{lastNight.enchantedIds?.length>lastNight.newEnchantedIds?.length&&<V><span style={{fontSize:'11px',opacity:.6}}>Total : {lastNight.enchantedIds.map(id=>N(id)).join(', ')}</span></V>}</Bloc>);

                // ── 1ÈRE NUIT SPÉCIALE
                if(lastNight.isFirstNight){
                  if(lastNight.loversIds?.length===2) events.push(<Bloc key="cup"><S color="#c06090">💘 Amoureux (Cupidon)</S><V bold>{lastNight.loversIds.map(id=>N(id)).join(' & ')}</V></Bloc>);
                  if(lastNight.chienLoupId) events.push(<Bloc key="cl"><S color="var(--amber)">🐕 Chien-Loup a choisi</S><V bold><span style={{color:lastNight.chienLoupCamp==='loups'?'var(--blood)':'var(--green)'}}>{lastNight.chienLoupCamp==='loups'?'🐺 Camp des Loups':'🌿 Camp Village'}</span></V></Bloc>);
                  if(lastNight.enfantSauvageId&&lastNight.enfantSauvageModelId) events.push(<Bloc key="es"><S color="var(--green)">🧒 Modèle Enfant Sauvage</S><V bold>{N(lastNight.enfantSauvageModelId)}</V></Bloc>);
                  if(lastNight.voleurId&&lastNight.voleurChosenRole) events.push(<Bloc key="vol"><S color="var(--amber)">🃏 Voleur a pris le rôle</S><V bold>{ROLES[lastNight.voleurChosenRole]?.emoji} {ROLES[lastNight.voleurChosenRole]?.name}</V></Bloc>);
                }

                return <div style={{
                  display:'grid',
                  gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',
                  gap:'0 12px',
                  alignItems:'start'
                }}>{events}</div>;
              })()}
            </div>
          )}

          {/* Ordre de nuit */}
          <div style={{flex:1,background:'rgba(13,10,6,.85)',border:'1px solid rgba(201,168,76,.18)',borderRadius:'6px',padding:'12px'}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:'9px',letterSpacing:'.2em',color:'rgba(201,168,76,.6)',textTransform:'uppercase',marginBottom:'8px'}}>🌙 Ordre de nuit</div>
            <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
              {nightBarItems.map((it,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <span style={{fontSize:'14px'}}>{ROLES[it.role]?.emoji||'✦'}</span>
                  <span style={{fontFamily:"'IM Fell English',serif",fontSize:'13px',color:'rgba(245,230,200,.7)'}}>{it.name}</span>
                </div>
              ))}
            </div>
          </div>

        </div>{/* fin flex récap+ordre */}
      </div>{/* fin panneau bas */}

      {/* Modal joueur */}
      {selId&&(()=>{
        const p=players.find(x=>x.id===selId);if(!p) return null;
        const role=ROLES[p.role];
        return(
          <div className="ov" onClick={()=>setSelId(null)}>
            <div className="pmod" onClick={e=>e.stopPropagation()}>
              <div className="mod-name">{p.name}</div>
              <div className="mod-rl">
                <span style={{fontSize:'20px'}}>{role?.emoji||'❓'}</span>
                <span>{role?.name||'Sans rôle'}</span>
                {p.alive?<span style={{marginLeft:'auto',color:'var(--green)',fontSize:'11px',fontFamily:"'Cinzel',serif"}}>VIVANT</span>:<span style={{marginLeft:'auto',color:'var(--blood)',fontSize:'11px',fontFamily:"'Cinzel',serif"}}>✝ MORT</span>}
              </div>
              {role?.desc&&<p className="mod-desc">{role.desc}</p>}
              {/* Infos supplémentaires joueur */}
              {p.lover&&<div style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',fontStyle:'italic',color:'#c06090',marginBottom:'6px'}}>💘 Amoureux de {players.find(x=>x.id===p.loverId)?.name||'?'}</div>}
              {p.role==='ENFANT_SAUVAGE'&&p.model&&<div style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',fontStyle:'italic',color:'var(--green)',marginBottom:'6px'}}>🌿 Modèle : {players.find(x=>x.id===p.model)?.name||'?'}</div>}
              {p.enchanted&&<div style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',fontStyle:'italic',color:'var(--purple)',marginBottom:'6px'}}>🎵 Joueur charmé</div>}
              {isWolf(p)&&<div style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',fontStyle:'italic',color:'var(--blood)',marginBottom:'6px'}}>🐺 Camp des Loups</div>}
              <div className="mod-btns" style={{marginTop:'8px'}}>
                {p.alive?<button className="mb kill" onClick={()=>{toggleAlive(p.id);setSelId(null);}}>🗡️ Tuer le joueur</button>:<button className="mb rev" onClick={()=>{toggleAlive(p.id);setSelId(null);}}>↩ Ressusciter</button>}
                <button className="mb cls" onClick={()=>setSelId(null)}>Fermer</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── MODALE RESET ── */}
      {showReset&&(
        <div className="ov" onClick={()=>setShowReset(false)}>
          <div className="pmod" style={{maxWidth:'460px',maxHeight:'80vh',overflow:'hidden',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
              <div className="mod-name" style={{fontSize:'17px'}}>🔄 Nouvelle partie</div>
              <button onClick={()=>setShowReset(false)} style={{background:'none',border:'none',color:'rgba(26,16,8,.4)',fontSize:'20px',cursor:'pointer'}}>✕</button>
            </div>
            <p style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',fontStyle:'italic',color:'rgba(26,16,8,.5)',marginBottom:'12px',lineHeight:1.4}}>
              Qui joue la prochaine partie ? Clique pour retirer un joueur.
            </p>
            <div style={{overflowY:'auto',flex:1,marginBottom:'12px',display:'flex',flexDirection:'column',gap:'6px'}}>
              {resetKeep.map(p=>(
                <div key={p.id}
                  style={{display:'flex',alignItems:'center',gap:'8px',padding:'8px 10px',borderRadius:'3px',border:`1px solid ${p.keep?'rgba(45,90,61,.4)':'rgba(139,26,26,.3)'}`,background:p.keep?'rgba(45,90,61,.08)':'rgba(139,26,26,.06)',cursor:'pointer',transition:'all .15s'}}
                  onClick={()=>setResetKeep(prev=>prev.map(x=>x.id===p.id?{...x,keep:!x.keep}:x))}>
                  <span style={{fontSize:'16px'}}>{p.keep?'✓':'✗'}</span>
                  <span style={{fontFamily:"'IM Fell English',serif",fontSize:'14px',color:p.keep?'var(--ink)':'rgba(26,16,8,.38)',flex:1,textDecoration:p.keep?'none':'line-through'}}>{p.name}</span>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:'9px',letterSpacing:'.1em',color:p.keep?'var(--green)':'var(--blood)'}}>{p.keep?'JOUE':'PART'}</span>
                </div>
              ))}
              {/* Ajouter un joueur */}
              <button
                style={{padding:'8px',background:'transparent',border:'1px dashed rgba(26,16,8,.2)',borderRadius:'3px',fontFamily:"'Cinzel',serif",fontSize:'10px',letterSpacing:'.12em',color:'rgba(26,16,8,.4)',cursor:'pointer',transition:'all .2s'}}
                onClick={()=>setResetKeep(prev=>[...prev,{id:Date.now(),name:`Joueur ${prev.length+1}`,keep:true}])}>
                ➕ Ajouter un joueur
              </button>
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button className="btn-g" style={{flex:1}} onClick={()=>setShowReset(false)}>Annuler</button>
              <button className="btn-p" style={{flex:2}} disabled={resetKeep.filter(p=>p.keep).length<5} onClick={confirmReset}>
                Valider ({resetKeep.filter(p=>p.keep).length} joueurs)
              </button>
            </div>
            {resetKeep.filter(p=>p.keep).length<5&&<p style={{fontFamily:"'IM Fell English',serif",fontSize:'11px',fontStyle:'italic',color:'var(--blood)',textAlign:'center',marginTop:'6px'}}>Minimum 5 joueurs requis</p>}
          </div>
        </div>
      )}

      {showNight&&<NightSlide slides={nightSlides} idx={nightIdx} setIdx={setNightIdx} players={players} setPlayers={setPlayers} na={na} setNA={setNA} onClose={()=>setShowNight(false)} onFinish={()=>{applyNight();setNightCount(n=>n+1);}} assignRole={assignRole} title="✦ Première Nuit ✦" isFirstNight={true} voleurChosenRole={voleurChosenRole} setVoleurChosenRole={setVoleurChosenRole} activeRoles={activeRoles} setPlayers={setPlayers}/>}
      {showEveryNight&&<NightSlide slides={everyNightSlides} idx={everyNightIdx} setIdx={setEveryNightIdx} players={players} setPlayers={setPlayers} na={na} setNA={setNA} onClose={()=>setShowEveryNight(false)} onFinish={()=>{applyNight();setNightCount(n=>n+1);setShowEveryNight(false);}} assignRole={assignRole} title="✦ Déroulé de la Nuit ✦" isFirstNight={false}/>}
    </div>
  );
}

function NightSlide({slides,idx,setIdx,players,setPlayers,na,setNA,onClose,onFinish,assignRole,title,isFirstNight,voleurChosenRole,setVoleurChosenRole,activeRoles}){
  const slide=slides[idx];
  const isRecap=slide.role==='RECAP';
  const role=slide.role;
  const ri=ROLES[role];
  const team=role==='LOUP'?'loups':role==='LOVER'?'solo':role==='CHARMED'?'variable':role==='RECAP'?'recap':ri?.team;
  const tc={loups:'tl',village:'tv',solo:'ts',variable:'ta',recap:'tr'}[team]||'tv';

  const getAssigned=r=>{
    if(r==='LOUP') return players.filter(p=>isWolf(p)&&p.alive);
    if(r==='LOVER') return players.filter(p=>p.lover&&p.alive);
    if(r==='CHARMED') return players.filter(p=>p.enchanted&&p.alive);
    return players.filter(p=>p.role===r&&p.alive);
  };

  const wolfVP=players.find(p=>p.id===na.wolfVictim);
  const corbP=players.find(p=>p.id===na.corbeauTarget);
  const salSaved=na.salvateurTarget&&na.wolfVictim&&na.salvateurTarget===na.wolfVictim;
  const potSaved=na.potionLifeUsed&&na.wolfVictim;

  // Rôles "simples" de la première nuit : juste assigner + info
  const SIMPLE_FIRST=['VILLAGEOIS','ANCIEN','CHASSEUR','ANGE','CHEVALIER','BOUC','PETITE_FILLE','IDIOT','MONTREUR_OURS','JUGE_BEGUE','LOUP_BLANC'];
  // RENARD a son propre bloc UI — ENFANT_SAUVAGE est dans SIMPLE + a un bloc modèle en bonus
  const isSimpleFirstNight=isFirstNight&&SIMPLE_FIRST.includes(role);
  const cur=getAssigned(role);
  const lbActif=slide.actif!==false; // pour loup blanc : actif=false = nuit de repos

  return(
    <div className="nsw">
      <div className="nsprog"><div className="nspf" style={{width:`${((idx+1)/slides.length)*100}%`}}/></div>
      <div className="nshdr">
        <span className="nscnt">{idx+1} / {slides.length}</span>
        <span className="nstit">{title||'✦ Nuit ✦'}</span>
        <button className="nscls" onClick={onClose}>✕</button>
      </div>

      <div className="nsbody">
        {/* RÉCAP */}
        {isRecap&&(()=>{
          // Calculer les morts de cette nuit
          const deadThisNight=[];
          if(wolfVP&&!salSaved&&!potSaved) deadThisNight.push(wolfVP);
          if(na.potionDeathTarget){const pd=players.find(x=>x.id===na.potionDeathTarget);if(pd)deadThisNight.push(pd);}
          if(na.loupBlancTarget){const lb=players.find(x=>x.id===na.loupBlancTarget);if(lb&&!deadThisNight.find(d=>d.id===lb.id))deadThisNight.push(lb);}
          if(na.gmgVictim){const gm=players.find(x=>x.id===na.gmgVictim);if(gm&&!deadThisNight.find(d=>d.id===gm.id))deadThisNight.push(gm);}
          return(
          <div className="nscard tr" style={{gap:'12px'}}>
            <span className="nse">📜</span>
            <h2 className="nsn">Récap de la Nuit</h2>
            {/* Compteur de morts */}
            <div style={{display:'flex',gap:'12px',alignItems:'center'}}>
              <div style={{textAlign:'center',padding:'8px 16px',borderRadius:'6px',background:deadThisNight.length===0?'rgba(45,90,61,.15)':'rgba(139,26,26,.15)',border:`1px solid ${deadThisNight.length===0?'var(--green)':'var(--blood)'}`}}>
                <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:'24px',fontWeight:'700',color:deadThisNight.length===0?'var(--green)':'var(--blood)',lineHeight:1}}>{deadThisNight.length}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:'8px',letterSpacing:'.15em',color:deadThisNight.length===0?'var(--green)':'var(--blood)',marginTop:'3px'}}>MORT{deadThisNight.length>1?'S':''}</div>
              </div>
              {deadThisNight.length===0
                ?<div style={{fontFamily:"'IM Fell English',serif",fontSize:'13px',fontStyle:'italic',color:'var(--green)'}}>Personne n'est mort cette nuit ! 🎉</div>
                :<div style={{display:'flex',flexDirection:'column',gap:'3px'}}>{deadThisNight.map(p=><div key={p.id} style={{fontFamily:"'IM Fell English',serif",fontSize:'13px',fontWeight:'bold',color:'var(--blood)'}}>• {p.name} <span style={{fontWeight:'normal',opacity:.6,fontSize:'11px'}}>({ROLES[p.role]?.name})</span></div>)}</div>
              }
            </div>
            <div className="nsdiv"/>
            <div className="rc d" style={{width:'100%'}}>
              <div className="rct">🐺 Les loups ont dévoré</div>
              {wolfVP?(
                <div>
                  <div className="rctx" style={{fontWeight:'bold'}}>{wolfVP.name} <span style={{opacity:.55,fontSize:'12px'}}>({ROLES[wolfVP.role]?.name})</span></div>
                  {salSaved&&<div className="rctx" style={{color:'var(--green)',fontSize:'12px',marginTop:'4px'}}>🛡️ Sauvé par le Salvateur — reste en vie</div>}
                  {potSaved&&!salSaved&&<div className="rctx" style={{color:'var(--green)',fontSize:'12px',marginTop:'4px'}}>🧪 Sauvé par la potion de vie — reste en vie</div>}
                  {!salSaved&&!potSaved&&<div className="rctx" style={{color:'var(--blood)',fontSize:'12px',marginTop:'4px'}}>💀 Éliminé cette nuit</div>}
                </div>
              ):<div className="rctx" style={{opacity:.4,fontStyle:'italic'}}>Personne n'a été ciblé</div>}
            </div>
            {corbP&&(
              <div className="rc c" style={{width:'100%'}}>
                <div className="rct">🦅 Corbeau</div>
                <div className="rctx">{corbP.name} aura <strong>+2 voix</strong> au prochain vote</div>
              </div>
            )}
            <div className="rc e" style={{width:'100%'}}>
              <div className="rct">💀 Morts cette nuit</div>
              {(()=>{
                const dead=[];
                if(wolfVP&&!salSaved&&!potSaved) dead.push(wolfVP);
                if(na.potionDeathTarget){const p=players.find(x=>x.id===na.potionDeathTarget);if(p)dead.push(p);}
                return dead.length===0?<div className="rctx" style={{color:'var(--green)',fontStyle:'italic'}}>Personne n'est mort ! 🎉</div>:dead.map(p=><div key={p.id} className="rctx" style={{color:'#ff8888'}}>• {p.name} ({ROLES[p.role]?.name})</div>);
              })()}
            </div>
          </div>
          );
        })()}

        {/* SLIDES NORMAUX */}
        {!isRecap&&(
          <div className={`nscard ${tc}`}>
            <span className="nse">{role==='LOUP'?'🐺':role==='LOVER'?'💘':role==='CHARMED'?'🎵':ri?.emoji||'❓'}</span>
            <h2 className="nsn">{slide.name}</h2>
            <p className="nsnote">{slide.note}</p>
            {ri?.desc&&<p style={{fontFamily:"'IM Fell English',serif",fontSize:'12px',fontStyle:'italic',color:'rgba(26,16,8,.45)',textAlign:'center',lineHeight:1.4,maxWidth:'280px',padding:'0 4px'}}>{ri.desc}</p>}
            <div className="nsdiv"/>

            {/* Simple 1ère nuit : assigner + rôle */}
            {isSimpleFirstNight&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'6px'}}>
                <div className="nslbl">Qui joue ce rôle ?</div>
                <select className="nssel" value={cur.length>0?cur[0].id:''} onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,role);}}>
                  <option value="">— Sélectionner un joueur —</option>
                  {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!==role?` (${ROLES[p.role]?.name})`:''}</option>)}
                </select>
                {cur.length>0&&<div className="nscfm g">✓ {cur[0].name}</div>}
              </div>
            )}

            {/* CHIEN-LOUP : choisir son camp */}
            {role==='CHIEN_LOUP'&&isFirstNight&&(
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'8px'}}>
                <div className="nslbl">Qui joue ce rôle ?</div>
                <select className="nssel" value={cur.length>0?cur[0].id:''} onChange={e=>{const id=parseInt(e.target.value);if(id)assignRole(id,'CHIEN_LOUP');}}>
                  <option value="">— Sélectionner —</option>
                  {players.filter(p=>p.alive).map(p=><option key={p.id} value={p.id}>{p.name}{p.role&&p.role!=='CHIEN_LOUP'?` (${ROLES[p.role]?.name})`:''}</option>)}
                </select>
                {cur.length>0&&<div className="nscfm g">✓ {cur[0].name}</div>}
                {cur.length>0&&<>
                  <div className="nsdiv"/>
                  <div className="nslbl">Quel camp choisit-il ?</div>
                  <div style={{display:'flex',gap:'8px'}}>
                    <button
